<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastrear Pedido — ProspectIA Track</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F4F6FB;color:#0D1526;min-height:100vh}

.header{background:#fff;border-bottom:1px solid #E2E7F3;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#2563EB,#1D4ED8);display:flex;align-items:center;justify-content:center}
.logo-text{font-size:16px;font-weight:800;color:#0D1526;letter-spacing:-.3px}
.logo-text em{font-style:normal;color:#2563EB}

.hero{background:linear-gradient(150deg,#080E1C 0%,#0D1A3A 50%,#080E1C 100%);padding:52px 24px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:36px 36px;pointer-events:none}
.hero-glow{position:absolute;width:500px;height:300px;top:-80px;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(37,99,235,.25) 0%,transparent 65%);pointer-events:none}
.hero h1{font-size:28px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:8px;position:relative;z-index:1}
.hero p{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:28px;position:relative;z-index:1}

.search-box{position:relative;z-index:1;max-width:520px;margin:0 auto;display:flex;gap:10px}
.search-inp{flex:1;height:50px;padding:0 16px;border:2px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.08);color:#fff;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s;backdrop-filter:blur(8px)}
.search-inp::placeholder{color:rgba(255,255,255,.35)}
.search-inp:focus{border-color:rgba(99,153,255,.6)}
.search-btn{height:50px;padding:0 22px;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity .15s;box-shadow:0 4px 14px rgba(37,99,235,.4)}
.search-btn:hover{opacity:.9}
.search-btn:disabled{opacity:.5;cursor:not-allowed}

.container{max-width:640px;margin:0 auto;padding:32px 24px}

/* estado vazio */
.empty{text-align:center;padding:48px 0;color:#5A6A8A}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.6}

/* card resultado */
.result-card{background:#fff;border:1px solid #E2E7F3;border-radius:16px;overflow:hidden;margin-bottom:20px}
.result-header{padding:24px;border-bottom:1px solid #F0F3FA}
.result-codigo{font-size:12px;font-weight:600;color:#5A6A8A;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.result-status-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.result-status-big{font-size:22px;font-weight:800;letter-spacing:-.4px}
.result-transp{font-size:13px;color:#5A6A8A;margin-top:4px}
.result-local{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:13px;color:#3D4D6A}

/* status colors */
.s-entregue{color:#059669}
.s-transito{color:#2563EB}
.s-entrega{color:#D97706}
.s-postado{color:#6B7280}
.s-outros{color:#374151}

.badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:600}
.b-entregue{background:#D1FAE5;color:#059669}
.b-transito{background:#DBEAFE;color:#1D4ED8}
.b-entrega{background:#FEF3C7;color:#B45309}
.b-postado{background:#F3F4F6;color:#374151}
.b-outros{background:#F3F4F6;color:#374151}

/* timeline */
.timeline-wrap{padding:24px}
.timeline-title{font-size:13px;font-weight:700;color:#3D4D6A;margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px}
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:5px;top:6px;bottom:6px;width:2px;background:#E2E7F3}
.tl-item{position:relative;padding-bottom:20px;padding-left:20px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-20px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid #E2E7F3;background:#fff}
.tl-item:first-child .tl-dot{background:#2563EB;border-color:#2563EB}
.tl-status{font-size:13px;font-weight:600;color:#0D1526;margin-bottom:2px}
.tl-local{font-size:12px;color:#5A6A8A}
.tl-data{font-size:11px;color:#9AAAC5;margin-top:3px}

/* not found */
.not-found{background:#FEF2F2;border:1px solid #FECACA;border-radius:16px;padding:28px;text-align:center}
.not-found-icon{font-size:36px;margin-bottom:10px}
.not-found h3{font-size:16px;font-weight:700;color:#991B1B;margin-bottom:6px}
.not-found p{font-size:13px;color:#B91C1C;line-height:1.5}

.footer{text-align:center;padding:32px 24px;color:#9AAAC5;font-size:12px}
.footer a{color:#2563EB;text-decoration:none}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/><rect x="9" y="11" width="14" height="10" rx="2"/></svg>
    </div>
    <span class="logo-text">Prospect<em>IA</em> Track</span>
  </div>
</div>

<div class="hero">
  <div class="hero-glow"></div>
  <h1>Rastreie seu pedido</h1>
  <p>Digite o código de rastreio para ver o status atualizado</p>
  <div class="search-box">
    <input class="search-inp" id="inputCodigo" placeholder="Ex: OU123456789BR" maxlength="30"
      onkeydown="if(event.key==='Enter') rastrear()">
    <button class="search-btn" id="btnRastrear" onclick="rastrear()">Rastrear</button>
  </div>
</div>

<div class="container" id="resultado">
  <div class="empty">
    <div class="empty-icon">📦</div>
    <p>Digite o código de rastreio acima<br>para consultar o status do seu pedido.</p>
  </div>
</div>

<div class="footer">
  Powered by <a href="/">ProspectIA Track</a> · Sistema de rastreamento inteligente
</div>

<script>
// Lê código da URL se vier como ?codigo=XXX
const params = new URLSearchParams(location.search);
const codigoURL = params.get('codigo') || params.get('code');
if (codigoURL) {
  document.getElementById('inputCodigo').value = codigoURL;
  rastrear();
}

function classeStatus(status) {
  const s = (status || '').toLowerCase();
  if (s.includes('entregue')) return 'entregue';
  if (s.includes('trânsi') || s.includes('transi')) return 'transito';
  if (s.includes('saiu') || s.includes('entrega')) return 'entrega';
  if (s.includes('postado')) return 'postado';
  return 'outros';
}

function dt(str) {
  if (!str || str.startsWith('0001')) return '';
  return new Date(str).toLocaleString('pt-BR', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

async function rastrear() {
  const codigo = document.getElementById('inputCodigo').value.trim().toUpperCase();
  if (!codigo) return;

  const btn = document.getElementById('btnRastrear');
  btn.disabled = true;
  btn.textContent = 'Consultando...';

  // Atualiza URL sem recarregar
  history.replaceState(null, '', `?codigo=${codigo}`);

  const el = document.getElementById('resultado');
  el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>Consultando o código <strong>${codigo}</strong>...</p></div>`;

  try {
    const r = await fetch(`/consulta/${codigo}`);

    if (r.status === 404) {
      el.innerHTML = `
        <div class="not-found">
          <div class="not-found-icon">🔎</div>
          <h3>Código não encontrado</h3>
          <p>O código <strong>${codigo}</strong> não foi localizado no sistema.<br>
          Verifique se digitou corretamente ou aguarde — pode levar alguns minutos para o sistema atualizar após o envio.</p>
        </div>`;
      return;
    }

    const d = await r.json();
    const cls = classeStatus(d.status);

    const saudacao = d.destinatario_nome ? `<div style="font-size:13px;color:#5A6A8A;margin-bottom:16px">Olá, <strong>${d.destinatario_nome}</strong> — acompanhe abaixo o seu pedido.</div>` : '';

    const timeline = (d.historico || []).map((ev, i) => `
      <div class="tl-item">
        <div class="tl-dot"></div>
        <div class="tl-status">${ev.status}</div>
        ${ev.localizacao ? `<div class="tl-local">📍 ${ev.localizacao}</div>` : ''}
        ${ev.descricao && ev.descricao !== ev.status ? `<div class="tl-local">${ev.descricao}</div>` : ''}
        ${ev.data ? `<div class="tl-data">${dt(ev.data)}</div>` : ''}
      </div>`).join('');

    el.innerHTML = `
      ${saudacao}
      <div class="result-card">
        <div class="result-header">
          <div class="result-codigo">Código de rastreio</div>
          <div class="result-status-row">
            <div>
              <div class="result-status-big s-${cls}">${d.status}</div>
              <div class="result-transp">${d.transportadora || ''}</div>
            </div>
            <span class="badge b-${cls}">${d.status}</span>
          </div>
          ${d.localizacao ? `<div class="result-local"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5A6A8A" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${d.localizacao}</div>` : ''}
          <div style="margin-top:8px;font-size:12px;color:#9AAAC5">Atualizado em ${dt(d.ultima_atualizacao)}</div>
        </div>
        ${timeline ? `
        <div class="timeline-wrap">
          <div class="timeline-title">Histórico de eventos</div>
          <div class="timeline">${timeline}</div>
        </div>` : ''}
      </div>
      <div style="text-align:center">
        <button onclick="rastrear()" style="background:none;border:1px solid #E2E7F3;border-radius:10px;padding:10px 20px;font-size:13px;font-family:'Inter',sans-serif;color:#5A6A8A;cursor:pointer">↻ Atualizar status</button>
      </div>`;
  } catch {
    el.innerHTML = `<div class="not-found"><div class="not-found-icon">⚠️</div><h3>Erro de conexão</h3><p>Não foi possível consultar. Tente novamente em instantes.</p></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Rastrear';
  }
}
</script>
</body>
</html>
